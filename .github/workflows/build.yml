name: Auto Build Windows EXE
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"  # 改成你本地实际用的 Python 版本，比如 3.11

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 获取依赖路径
        run: |
          echo "SITE=$(python -c "import site; print(site.getsitepackages()[0])")" >> $env:GITHUB_ENV

      - name: 打包 EXE（解决 PIL/bs4 缺失）
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --clean `
            --noconfirm `
            --add-data "$env:SITE\PIL;PIL" `
            --add-data "$env:SITE\bs4;bs4" `
            --hidden-import=PIL `
            --hidden-import=PIL.Image `
            --hidden-import=PIL._imaging `
            --hidden-import=bs4 `
            --hidden-import=beautifulsoup4 `
            --name=财务助手 `
            main.py  # 改成你的主程序文件名，比如 assistant.py

      - name: 上传打包好的 EXE
        uses: actions/upload-artifact@v4
        with:
          name: finance-assistant_Windows版
          path: dist/
